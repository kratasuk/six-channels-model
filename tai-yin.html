<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tài yīn — Greater Yin · deep dive</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="favicon.svg">
<style>
  :root{
    --bg:#0a0d13; --panel:#11161f; --panel2:#171d2a; --line:#252d3d; --line2:#313b50;
    --ink:#edece6; --ink2:#9aa6ba; --ink3:#697384;
    --yin:#5f93cf; --lung:#7fb0e6; --lung-bd:rgba(127,176,230,.5);
    --spleen:#e0ac52; --spleen-bd:rgba(224,172,82,.5);
    --damp:#4f86c6; --nutr:#4eb784; --qi:#3bbdb2; --wei:#bf8ae6; --engine:#ef6f40; --chan:#4fb0a8;
    --heart:#e0594b; --kidney:#4f86c6; --liver:#4eb784; --yangming:#d8a64e;
  }
  body.light{
    --bg:#eef1f6; --panel:#fff; --panel2:#f1f4f9; --line:#d7dde7; --line2:#c4ccdb;
    --ink:#1a2130; --ink2:#4d566b; --ink3:#7b8498;
    --yin:#2f63a0; --lung:#2f63a0; --lung-bd:rgba(47,99,160,.5);
    --spleen:#a9741d; --spleen-bd:rgba(169,116,29,.5);
    --damp:#2f63a0; --nutr:#2f8f5e; --qi:#1f8f86; --wei:#7b46b0; --engine:#cf5a23; --chan:#1f8f86;
    --heart:#c33c2f; --kidney:#2f63a0; --liver:#2f8f5e; --yangming:#a9741d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1100px 640px at 50% -8%,#141d2e 0%,var(--bg) 58%);
    color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  body.light{background:radial-gradient(1100px 640px at 50% -8%,#fff 0%,var(--bg) 60%)}
  .wrap{max-width:1500px;margin:0 auto;padding:18px 20px 30px}
  .topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .back{border:1px solid var(--line);background:var(--panel);color:var(--ink2);text-decoration:none;
    padding:7px 12px;border-radius:9px;font-size:12.5px;transition:.16s;white-space:nowrap}
  .back:hover{border-color:var(--line2);color:var(--ink)}
  .brand{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink2);font-weight:600}
  .brand b{color:var(--yin);font-weight:700}.brand span{color:var(--ink3)}
  .views{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-left:auto}
  .tab{border:1px solid var(--line);background:var(--panel);color:var(--ink2);padding:7px 13px;border-radius:9px;font-size:12.5px;cursor:pointer;transition:.16s;user-select:none;white-space:nowrap}
  .tab:hover{border-color:var(--line2);color:var(--ink)} .tab.on{background:var(--ink);color:var(--bg);font-weight:600;border-color:var(--ink)}
  .tbtn{border:1px solid var(--line);background:var(--panel);color:var(--ink2);width:33px;height:33px;border-radius:9px;cursor:pointer;font-size:14px;transition:.16s}
  .tbtn:hover{color:var(--ink);border-color:var(--line2)}
  .vhint{color:var(--ink3);font-size:12px;margin:0 0 4px;min-height:16px}
  .stage{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;align-items:stretch}
  .svgbox{flex:1 1 700px;min-width:320px;background:linear-gradient(180deg,#121824,#0e131c);border:1px solid var(--line);border-radius:18px;padding:8px 12px}
  body.light .svgbox{background:linear-gradient(180deg,#fff,#f3f6fb)}
  svg#scheme{width:100%;height:auto;display:block}
  aside{flex:1 1 350px;min-width:300px;max-width:440px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 17px}
  #info .htag{display:inline-block;font-size:10.5px;letter-spacing:.7px;text-transform:uppercase;padding:3px 9px;border-radius:6px;font-weight:600;margin-bottom:10px}
  #info h2{margin:0 0 2px;font-size:19px}#info .sub{color:var(--ink2);font-size:13px;margin:0 0 12px}
  #info .row{display:flex;gap:11px;padding:8px 10px;border-radius:9px;font-size:13px;margin-bottom:3px}
  #info .row .k{color:var(--ink3);flex:0 0 78px;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;padding-top:2px;font-weight:600}
  #info .row .v{color:var(--ink);flex:1}
  #info .row.a{background:rgba(127,176,230,.10)} #info .row.a .k{color:var(--lung)}
  #info .row.b{background:rgba(224,172,82,.12)} #info .row.b .k{color:var(--spleen)}
  #info .note{margin-top:12px;padding:10px 13px;background:var(--panel2);border-radius:11px;font-size:12.5px;color:var(--ink2)}
  .legendbar{display:flex;flex-wrap:wrap;gap:7px 18px;align-items:center;margin-top:14px;font-size:11px;color:var(--ink3)}
  .legendbar i{display:inline-block;width:16px;border-top-width:3px;border-top-style:solid;margin-right:6px;vertical-align:3px}
  .hit{cursor:pointer} .hit:focus{outline:none} .hit:focus-visible .nb{stroke:var(--ink);stroke-width:2.4}
  .nb{transition:.16s} .hit:hover .nb{filter:brightness(1.22)} .hit.sel .nb{stroke-width:2.4}
  .vlayer{opacity:0;transition:opacity .4s;pointer-events:none}
  #scheme.l-metab .v-metab{opacity:1}
  #scheme.l-yingwei .v-yingwei{opacity:1}
  #scheme.l-lungfn .v-lungfn{opacity:1} #scheme.l-lungfn .v-lungfn .hit{pointer-events:auto}
  #scheme.l-spleenfn .v-spleenfn{opacity:1} #scheme.l-spleenfn .v-spleenfn .hit{pointer-events:auto}
  #scheme.l-rel .v-rel{opacity:1} #scheme.l-rel .v-rel .hit{pointer-events:auto}
  #scheme.l-clinical .v-clinical{opacity:1} #scheme.l-clinical .v-clinical .hit{pointer-events:auto}
  #scheme.focus .flowG{opacity:.18}
  #scheme.cover .heroOrg,#scheme.cover .flowG,#scheme.cover .torso{opacity:0}
  #coverBg{opacity:0;transition:opacity .3s;pointer-events:none}
  #scheme.cover #coverBg{opacity:.97;pointer-events:auto}
  @media (prefers-reduced-motion: reduce){ .vlayer,.nb,.tab,.tbtn{transition:none !important} }
  @media print{ :root{--bg:#fff;--panel:#fff;--ink:#111;--ink2:#444;--ink3:#666;--line:#ccc;--line2:#bbb}
    body{background:#fff} .views,.tbtn{display:none} .svgbox{background:#fff !important;border:1px solid #ddd} .stage{display:block} aside{max-width:none;margin-top:14px} }
  @media (max-width:560px){ .brand{font-size:11px} .tab{padding:6px 9px;font-size:11.5px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" href="./" aria-label="Back to atlas">← Atlas</a>
    <div class="brand"><b>Tài yīn</b> <span>· greater yin · Lung + Spleen</span></div>
    <div class="views">
      <div class="tab on" onclick="applyLens('overview')">Overview</div>
      <div class="tab" onclick="applyLens('metab')">Metabolism</div>
      <div class="tab" onclick="applyLens('yingwei')">Ying–Wèi</div>
      <div class="tab" onclick="applyLens('lung')">Lung</div>
      <div class="tab" onclick="applyLens('spleen')">Spleen</div>
      <div class="tab" onclick="applyLens('rel')">Relations</div>
      <div class="tab" onclick="applyLens('clinical')">Clinical</div>
      <button class="tbtn" onclick="toggleTheme()" aria-label="Toggle light or dark theme" title="Light / dark">◐</button>
    </div>
  </div>
  <p class="vhint" id="vhint"></p>

  <div class="stage">
    <div class="svgbox">
      <svg id="scheme" class="l-overview" viewBox="0 0 1200 780" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Tai yin deep dive: the Lung and Spleen engine" xmlns="http://www.w3.org/2000/svg">
        <desc>The Tai yin system — Lung and Spleen — shown as a central engine with inputs of qi and dampness and outputs of nutrition, plus lenses for its functions, nutritive-protective split, relationships and clinical use.</desc>
        <defs>
          <marker id="aD" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="var(--damp)"/></marker>
          <marker id="aN" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="var(--nutr)"/></marker>
          <marker id="aQ" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="var(--qi)"/></marker>
          <marker id="aW" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="var(--wei)"/></marker>
          <marker id="aL" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#8b97ab"/></marker>
          <linearGradient id="lungGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(127,176,230,.20)"/><stop offset="100%" stop-color="rgba(127,176,230,.06)"/></linearGradient>
          <linearGradient id="spleenGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(224,172,82,.20)"/><stop offset="100%" stop-color="rgba(224,172,82,.06)"/></linearGradient>
        </defs>

        <!-- torso silhouette -->
        <path d="M300,150 C450,86 750,86 900,150 C918,310 916,560 882,724 L318,724 C284,560 282,310 300,150 Z" fill="none" stroke="var(--line2)" stroke-width="1" opacity=".4"/>

        <!-- ===== FLOWS (Fig 5.1) ===== -->
        <g class="flowG">
          <path class="hit" d="M726,74 C690,96 666,116 652,140" fill="none" stroke="var(--qi)" stroke-width="2.2" marker-end="url(#aQ)" onmouseenter="showInfo('in_qi')" onclick="showInfo('in_qi')"/>
          <text x="736" y="66" fill="var(--qi)" font-size="11.5" font-weight="600">Qi from environment</text>
          <path class="hit" d="M430,92 C480,118 514,128 548,146" fill="none" stroke="var(--damp)" stroke-width="2.2" marker-end="url(#aD)" onmouseenter="showInfo('in_damp_ext')" onclick="showInfo('in_damp_ext')"/>
          <text x="300" y="78" fill="var(--damp)" font-size="11.5" font-weight="600">External dampness</text>
          <path class="hit" d="M928,548 C820,512 720,470 686,446" fill="none" stroke="var(--spleen)" stroke-width="2.2" marker-end="url(#aN)" onmouseenter="showInfo('in_food')" onclick="showInfo('in_food')"/>
          <text x="936" y="566" text-anchor="end" fill="var(--spleen)" font-size="11.5" font-weight="600">Raw food · yáng míng stomach</text>
          <path class="hit" d="M686,420 C800,404 900,402 958,400" fill="none" stroke="var(--nutr)" stroke-width="2.6" marker-end="url(#aN)" onmouseenter="showInfo('out_nutr')" onclick="showInfo('out_nutr')"/>
          <text x="828" y="388" text-anchor="middle" fill="var(--nutr)" font-size="11.5" font-weight="600">Nutrition · nutritive-protective →</text>
          <g class="hit" onmouseenter="showInfo('in_damp_int')" onclick="showInfo('in_damp_int')">
            <path d="M548,712 C560,640 575,520 588,470" fill="none" stroke="var(--damp)" stroke-width="1.8" stroke-dasharray="5 5" marker-end="url(#aD)" opacity=".8"/>
            <path d="M628,712 C620,640 612,520 606,470" fill="none" stroke="var(--damp)" stroke-width="1.8" stroke-dasharray="5 5" marker-end="url(#aD)" opacity=".8"/>
            <text x="588" y="734" text-anchor="middle" fill="var(--damp)" font-size="11.5" font-weight="600">Internal dampness ↑</text>
          </g>
          <!-- lung-spleen synergy loop -->
          <path d="M566,300 C548,330 548,362 566,392" fill="none" stroke="var(--ink2)" stroke-width="1.8" marker-end="url(#aL)" opacity=".7"/>
          <path d="M634,392 C652,362 652,330 634,300" fill="none" stroke="var(--ink2)" stroke-width="1.8" marker-end="url(#aL)" opacity=".7"/>
          <text x="600" y="350" text-anchor="middle" fill="var(--ink3)" font-size="10">lung ⇅ spleen</text>
        </g>

        <!-- ===== HERO ORGANS ===== -->
        <g class="heroOrg">
          <path d="M600,118 V152 M600,152 C588,162 576,168 566,172 M600,152 C612,162 624,168 634,172" fill="none" stroke="var(--lung)" stroke-width="1.6" opacity=".7"/>
          <g class="hit" onmouseenter="showInfo('org_lung')" onclick="showInfo('org_lung')">
            <ellipse class="nb" cx="548" cy="212" rx="50" ry="76" fill="url(#lungGrad)" stroke="var(--lung-bd)" stroke-width="1.5"/>
            <ellipse class="nb" cx="652" cy="212" rx="50" ry="76" fill="url(#lungGrad)" stroke="var(--lung-bd)" stroke-width="1.5"/>
            <text x="600" y="200" text-anchor="middle" fill="var(--lung)" font-size="17" font-weight="700">LUNG</text>
            <text x="600" y="220" text-anchor="middle" fill="var(--ink3)" font-size="10.5">arm · metal</text>
          </g>
          <g class="hit" onmouseenter="showInfo('org_spleen')" onclick="showInfo('org_spleen')">
            <ellipse class="nb" cx="600" cy="432" rx="86" ry="42" fill="url(#spleenGrad)" stroke="var(--spleen-bd)" stroke-width="1.5"/>
            <text x="600" y="427" text-anchor="middle" fill="var(--spleen)" font-size="16" font-weight="700">SPLEEN</text>
            <text x="600" y="446" text-anchor="middle" fill="var(--ink3)" font-size="10.5">leg · earth</text>
          </g>
        </g>

        <!-- ===== METABOLISM lens ===== -->
        <g class="vlayer v-metab" pointer-events="none">
          <rect x="190" y="392" width="200" height="26" rx="13" fill="#121a26" stroke="var(--damp)"/>
          <text x="290" y="409" text-anchor="middle" fill="var(--damp)" font-size="12" font-weight="600">① regulate dampness</text>
          <rect x="812" y="372" width="200" height="26" rx="13" fill="#121a26" stroke="var(--nutr)"/>
          <text x="912" y="389" text-anchor="middle" fill="var(--nutr)" font-size="12" font-weight="600">② distribute nutrition</text>
          <text x="600" y="690" text-anchor="middle" fill="var(--ink2)" font-size="11.5">Two metabolisms, one fluid medium — nutrition rides the fluids the spleen and lung govern</text>
        </g>

        <!-- backdrop for cover lenses (Ying-Wèi, Clinical) -->
        <rect id="coverBg" x="16" y="16" width="1168" height="748" rx="16" fill="var(--panel)" stroke="var(--line)" stroke-width="1"/>

        <!-- ===== YING-WEI lens ===== -->
        <g class="vlayer v-yingwei">
          <line x1="300" y1="150" x2="900" y2="150" stroke="var(--ink2)" stroke-width="1.5" opacity=".6"/>
          <text x="306" y="142" fill="var(--ink3)" font-size="11" letter-spacing="1">SKIN / SURFACE</text>
          <rect x="360" y="430" width="480" height="34" rx="17" fill="rgba(78,183,132,.12)" stroke="var(--nutr)" stroke-width="1.4"/>
          <text x="600" y="452" text-anchor="middle" fill="var(--nutr)" font-size="12.5" font-weight="600">VESSEL · nutritive (yíng) → steady, even pace →</text>
          <g stroke="var(--wei)" stroke-width="2" fill="none" marker-end="url(#aW)" opacity=".9">
            <path d="M430,430 C420,330 420,240 430,166"/><path d="M560,430 C552,330 552,240 560,166"/><path d="M690,430 C700,330 700,240 690,166"/><path d="M810,430 C820,330 820,240 810,166"/>
          </g>
          <rect class="hit" x="470" y="186" width="280" height="26" rx="13" fill="#121a26" stroke="var(--wei)" onmouseenter="showInfo('wei')" onclick="showInfo('wei')"/>
          <text x="610" y="203" text-anchor="middle" fill="var(--wei)" font-size="12" font-weight="600" pointer-events="none">protective (wèi) · fierce, to where needed</text>
          <rect class="hit" x="470" y="488" width="280" height="26" rx="13" fill="#121a26" stroke="var(--nutr)" onmouseenter="showInfo('ying')" onclick="showInfo('ying')"/>
          <text x="610" y="505" text-anchor="middle" fill="var(--nutr)" font-size="12" font-weight="600" pointer-events="none">nutritive (yíng) · inside the vessels</text>
          <text x="600" y="560" text-anchor="middle" fill="var(--ink2)" font-size="11.5">One source (food essence + air qi); clear → nutritive, turbid → protective</text>
        </g>

        <!-- ===== LUNG functions lens ===== -->
        <g class="vlayer v-lungfn">
          <g stroke="var(--lung)" stroke-width="1.3" opacity=".4">
            <line x1="600" y1="212" x2="250" y2="150"/><line x1="600" y1="212" x2="250" y2="265"/><line x1="600" y1="212" x2="950" y2="150"/><line x1="600" y1="212" x2="950" y2="265"/>
          </g>
          <g class="hit" transform="translate(250,150)" onmouseenter="showInfo('lf_resp')" onclick="showInfo('lf_resp')"><rect class="nb" x="-96" y="-24" width="192" height="48" rx="12" fill="url(#lungGrad)" stroke="var(--lung-bd)" stroke-width="1.3"/><text x="0" y="5" text-anchor="middle" fill="var(--lung)" font-size="13" font-weight="600">Respiration · rules vessels</text></g>
          <g class="hit" transform="translate(250,265)" onmouseenter="showInfo('lf_skin')" onclick="showInfo('lf_skin')"><rect class="nb" x="-96" y="-24" width="192" height="48" rx="12" fill="url(#lungGrad)" stroke="var(--lung-bd)" stroke-width="1.3"/><text x="0" y="5" text-anchor="middle" fill="var(--lung)" font-size="13" font-weight="600">Skin &amp; body hair</text></g>
          <g class="hit" transform="translate(950,150)" onmouseenter="showInfo('lf_pm')" onclick="showInfo('lf_pm')"><rect class="nb" x="-96" y="-24" width="192" height="48" rx="12" fill="url(#lungGrad)" stroke="var(--lung-bd)" stroke-width="1.3"/><text x="0" y="5" text-anchor="middle" fill="var(--lung)" font-size="13" font-weight="600">Prime minister → Heart</text></g>
          <g class="hit" transform="translate(950,265)" onmouseenter="showInfo('lf_po')" onclick="showInfo('lf_po')"><rect class="nb" x="-96" y="-24" width="192" height="48" rx="12" fill="url(#lungGrad)" stroke="var(--lung-bd)" stroke-width="1.3"/><text x="0" y="5" text-anchor="middle" fill="var(--lung)" font-size="13" font-weight="600">Corporeal soul · pò</text></g>
        </g>

        <!-- ===== SPLEEN functions lens ===== -->
        <g class="vlayer v-spleenfn">
          <g stroke="var(--spleen)" stroke-width="1.3" opacity=".4">
            <line x1="600" y1="432" x2="250" y2="400"/><line x1="600" y1="432" x2="250" y2="515"/><line x1="600" y1="432" x2="950" y2="400"/><line x1="600" y1="432" x2="950" y2="515"/>
          </g>
          <g class="hit" transform="translate(250,400)" onmouseenter="showInfo('sf_blood')" onclick="showInfo('sf_blood')"><rect class="nb" x="-96" y="-24" width="192" height="48" rx="12" fill="url(#spleenGrad)" stroke="var(--spleen-bd)" stroke-width="1.3"/><text x="0" y="5" text-anchor="middle" fill="var(--spleen)" font-size="13" font-weight="600">Governs blood</text></g>
          <g class="hit" transform="translate(250,515)" onmouseenter="showInfo('sf_qi')" onclick="showInfo('sf_qi')"><rect class="nb" x="-96" y="-24" width="192" height="48" rx="12" fill="url(#spleenGrad)" stroke="var(--spleen-bd)" stroke-width="1.3"/><text x="0" y="5" text-anchor="middle" fill="var(--spleen)" font-size="13" font-weight="600">Moves qi · transforms damp</text></g>
          <g class="hit" transform="translate(950,400)" onmouseenter="showInfo('sf_muscle')" onclick="showInfo('sf_muscle')"><rect class="nb" x="-96" y="-24" width="192" height="48" rx="12" fill="url(#spleenGrad)" stroke="var(--spleen-bd)" stroke-width="1.3"/><text x="0" y="5" text-anchor="middle" fill="var(--spleen)" font-size="13" font-weight="600">Muscles &amp; four limbs</text></g>
          <g class="hit" transform="translate(950,515)" onmouseenter="showInfo('sf_yi')" onclick="showInfo('sf_yi')"><rect class="nb" x="-96" y="-24" width="192" height="48" rx="12" fill="url(#spleenGrad)" stroke="var(--spleen-bd)" stroke-width="1.3"/><text x="0" y="5" text-anchor="middle" fill="var(--spleen)" font-size="13" font-weight="600">Stores intent · yì</text></g>
        </g>

        <!-- ===== RELATIONS lens ===== -->
        <g class="vlayer v-rel">
          <g stroke="#8b97ab" stroke-width="1.3" opacity=".45">
            <line x1="600" y1="432" x2="600" y2="650"/><line x1="640" y1="212" x2="900" y2="128"/><line x1="560" y1="212" x2="300" y2="128"/><line x1="540" y1="450" x2="300" y2="640"/><line x1="660" y1="450" x2="900" y2="640"/>
          </g>
          <g class="hit" transform="translate(600,656)" onmouseenter="showInfo('rel_yangming')" onclick="showInfo('rel_yangming')"><rect class="nb" x="-120" y="-24" width="240" height="48" rx="12" fill="rgba(216,166,78,.12)" stroke="var(--yangming)" stroke-width="1.3"/><text x="0" y="5" text-anchor="middle" fill="var(--yangming)" font-size="12.5" font-weight="600">Yáng míng — pair (damp ⇄ dry)</text></g>

const ALLLAYERS=['metab','yingwei','lungfn','spleenfn','rel','clinical'];
const svg=document.getElementById('scheme');
let pinned=null;
function render(d){
  if(typeof d==='string') d=INFO[d]; if(!d) return;
  let h='<span class="htag" style="background:'+d.bg+';color:'+d.tc+'">'+d.tag+'</span>';
  h+='<h2 style="color:'+d.tc+'">'+d.title+'</h2><p class="sub">'+d.sub+'</p>';
  d.rows.forEach(r=>h+='<div class="row '+(r[2]||'')+'"><div class="k">'+r[0]+'</div><div class="v">'+r[1]+'</div></div>');
  if(d.note)h+='<div class="note">'+d.note+'</div>';
  document.getElementById('info').innerHTML=h;
}
function showInfo(id){ render(id); pinned=id; document.querySelectorAll('.hit').forEach(n=>n.classList.toggle('sel', n.getAttribute('data-id')===id || (n.getAttribute('onclick')||'').indexOf("'"+id+"'")>-1)); }
let curLens='overview';
function applyLens(name){
  curLens=name; pinned=null;
  const order=['overview','metab','yingwei','lung','spleen','rel','clinical'];
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',order[i]===name));
  const V=VLENS[name];
  ALLLAYERS.forEach(l=>svg.classList.toggle('l-'+l, V.layers.indexOf(l)>-1));
  svg.classList.toggle('focus', !!V.focus);
  svg.classList.toggle('cover', !!V.cover);
  document.getElementById('vhint').textContent=V.hint;
  render(V.info);
  document.querySelectorAll('.hit').forEach(n=>n.classList.remove('sel'));
  try{history.replaceState(null,'','#'+name);}catch(e){}
}
function toggleTheme(){ document.body.classList.toggle('light'); try{localStorage.setItem('scm-theme',document.body.classList.contains('light')?'light':'dark');}catch(e){} }
(function init(){
  try{ if(localStorage.getItem('scm-theme')==='light') document.body.classList.add('light'); }catch(e){}
  document.querySelectorAll('.hit').forEach(n=>{ n.setAttribute('tabindex','0'); n.setAttribute('role','button');
    n.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); n.dispatchEvent(new Event('click')); } }); });
  const h=(location.hash||'').replace('#',''); applyLens(VLENS[h]?h:'overview');
})();
