<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Six Channels — Integral Model</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="favicon.svg">
<style>
  :root{
    --bg:#0a0d13; --panel:#11161f; --panel2:#171d2a; --line:#252d3d; --line2:#313b50;
    --ink:#edece6; --ink2:#9aa6ba; --ink3:#697384;
    --yang:#e0ac52; --yang-bd:rgba(224,172,82,.5);
    --yin:#5f93cf; --yin-bd:rgba(95,147,207,.5);
    --bridge:#bf8ae6; --qi:#3bbdb2; --engine:#ef6f40;
    --chan:#4fb0a8; --organ:#e0ac52;
    --open:#e0ac52; --pivot:#4fb0a8; --close:#8093c9;
    --wood:#4eb784; --fire:#e0594b; --earth:#d8a64e; --metal:#cdd5de; --water:#4f86c6;
  }
  body.light{
    --bg:#eef1f6; --panel:#ffffff; --panel2:#f1f4f9; --line:#d7dde7; --line2:#c4ccdb;
    --ink:#1a2130; --ink2:#4d566b; --ink3:#7b8498;
    --yang:#a9741d; --yang-bd:rgba(169,116,29,.5);
    --yin:#2f63a0; --yin-bd:rgba(47,99,160,.5);
    --bridge:#7b46b0; --qi:#1f8f86; --engine:#cf5a23;
    --chan:#1f8f86; --organ:#a9741d;
    --open:#a9741d; --pivot:#1f8f86; --close:#4a5aa8;
    --wood:#2f8f5e; --fire:#c33c2f; --earth:#a9741d; --metal:#5a6573; --water:#2f63a0;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1100px 640px at 50% -8%,#141d2e 0%,var(--bg) 58%);
    color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased}
  body.light{background:radial-gradient(1100px 640px at 50% -8%,#ffffff 0%,var(--bg) 60%)}
  .wrap{max-width:1500px;margin:0 auto;padding:18px 20px 30px}
  .topbar{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:12px}
  .brand{font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink2);font-weight:600}
  .brand b{color:var(--ink);font-weight:700}.brand span{color:var(--ink3);letter-spacing:1.5px}
  .views{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-left:auto}
  .tab{border:1px solid var(--line);background:var(--panel);color:var(--ink2);
    padding:7px 14px;border-radius:9px;font-size:12.5px;cursor:pointer;transition:.16s;user-select:none;white-space:nowrap}
  .tab:hover{border-color:var(--line2);color:var(--ink)}
  .tab.on{background:var(--ink);color:var(--bg);font-weight:600;border-color:var(--ink)}
  .tbtn{border:1px solid var(--line);background:var(--panel);color:var(--ink2);width:33px;height:33px;
    border-radius:9px;cursor:pointer;font-size:14px;line-height:1;transition:.16s}
  .tbtn:hover{color:var(--ink);border-color:var(--line2)}
  .vhint{color:var(--ink3);font-size:12px;margin:0 0 4px;min-height:16px}
  .stage{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;align-items:stretch}
  .svgbox{flex:1 1 700px;min-width:320px;background:linear-gradient(180deg,#121824,#0e131c);
    border:1px solid var(--line);border-radius:18px;padding:8px 12px}
  body.light .svgbox{background:linear-gradient(180deg,#ffffff,#f3f6fb)}
  svg#scheme{width:100%;height:auto;display:block}
  aside{flex:1 1 340px;min-width:300px;max-width:430px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 17px}
  #info .htag{display:inline-block;font-size:10.5px;letter-spacing:.7px;text-transform:uppercase;padding:3px 9px;border-radius:6px;font-weight:600;margin-bottom:10px}
  #info h2{margin:0 0 2px;font-size:19px}#info .sub{color:var(--ink2);font-size:13px;margin:0 0 12px}
  #info .row{display:flex;gap:11px;padding:8px 10px;border-radius:9px;font-size:13px;margin-bottom:3px}
  #info .row .k{color:var(--ink3);flex:0 0 74px;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;padding-top:2px;font-weight:600}
  #info .row .v{color:var(--ink);flex:1}
  #info .row.ch{background:rgba(79,176,168,.10)} #info .row.ch .k{color:var(--chan)}
  #info .row.og{background:rgba(224,172,82,.12)} #info .row.og .k{color:var(--organ)}
  #info .note{margin-top:12px;padding:10px 13px;background:var(--panel2);border-radius:11px;font-size:12.5px;color:var(--ink2)}
  .legendbar{display:flex;flex-wrap:wrap;gap:7px 18px;align-items:center;margin-top:14px;font-size:11px;color:var(--ink3)}
  .legendbar i{display:inline-block;width:16px;border-top-width:3px;border-top-style:solid;margin-right:6px;vertical-align:3px}
  .legendbar .attrib{color:var(--ink3);opacity:.8}
  .node{cursor:pointer;transition:transform .6s cubic-bezier(.45,.05,.2,1)}
  .node:focus{outline:none} .node:focus-visible .nbg{stroke:var(--ink);stroke-width:2.6}
  .nodecard{transition:opacity .35s}.nodecap{opacity:0;pointer-events:none;transition:opacity .35s}
  #scheme.caps .nodecard{opacity:0;pointer-events:none}
  #scheme.caps .nodecap{opacity:1;pointer-events:auto}
  #scheme.view-phases .node{opacity:0;pointer-events:none}
  #scheme.view-taiji .node.eng,#scheme.view-phases .node.eng{opacity:0;pointer-events:none}
  .vlayer{opacity:0;transition:opacity .45s;pointer-events:none}
  #scheme.view-structure .d-structure{opacity:1}
  #scheme.view-steamer .d-steamer{opacity:1}
  #scheme.view-funnel .d-funnel{opacity:1}
  #scheme.view-taiji .d-taiji{opacity:1}
  #scheme.view-phases .d-phases{opacity:1}
  #scheme.view-phases .d-phases .hit{pointer-events:auto}
  #scheme.dim .node:not(.hl){opacity:.3}
  #hlPair,#hlLabel{opacity:0;transition:opacity .2s;pointer-events:none}
  #cycArc,#cycLabel{opacity:0;transition:opacity .25s;pointer-events:none}
  #scheme.show-cyc #cycArc,#scheme.show-cyc #cycLabel{opacity:1}
  #srcArrows{opacity:0;transition:opacity .25s;pointer-events:none}
  #scheme.show-src #srcArrows{opacity:.85}
  .node:hover .nbg{filter:brightness(1.2)} .node.hl .nbg{filter:brightness(1.3)}
  .phcard{cursor:pointer} .phcard:hover rect{filter:brightness(1.25)}
  .hit{cursor:pointer}
  @media (prefers-reduced-motion: reduce){ .node,.vlayer,#hlPair,#hlLabel,#srcArrows,.nodecard,.nodecap,.tab,.tbtn{transition:none !important} }
  @media print{
    :root{--bg:#fff;--panel:#fff;--panel2:#f2f2f2;--line:#ccc;--line2:#bbb;--ink:#111;--ink2:#444;--ink3:#666;
      --yang:#9a6a18;--yin:#2f5f9a;--engine:#c4521f;--bridge:#7340a0;--qi:#1f8076;--chan:#1f8076;--organ:#9a6a18;
      --open:#9a6a18;--pivot:#1f8076;--close:#46559c;--wood:#2c804f;--fire:#bb392d;--earth:#9a6a18;--metal:#566073;--water:#2f5f9a}
    body{background:#fff} .views,.tbtn,.vhint{display:none}
    .svgbox{background:#fff !important;border:1px solid #ddd} .stage{display:block} aside{max-width:none;margin-top:14px}
  }
  @media (max-width:560px){ .brand{font-size:11px;letter-spacing:1.5px} .tab{padding:6px 10px;font-size:12px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><b>The Six Channels</b> <span>· atlas of projections</span></div>
    <div class="views">
      <div class="tab on" onclick="applyView('structure')">Structure</div>
      <div class="tab" onclick="applyView('steamer')">Steamer</div>
      <div class="tab" onclick="applyView('funnel')">Funnel</div>
      <div class="tab" onclick="applyView('taiji')">Cycle</div>
      <div class="tab" onclick="applyView('phases')">Five Phases</div>
      <button class="tbtn" onclick="toggleTheme()" aria-label="Toggle light or dark theme" title="Light / dark">◐</button>
    </div>
  </div>
  <p class="vhint" id="vhint"></p>

  <div class="stage">
    <div class="svgbox">
      <svg id="scheme" class="view-structure" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet" role="img" aria-label="The Six Channels — interactive atlas of five projections" xmlns="http://www.w3.org/2000/svg">
        <desc>Six channel levels rearranged across five views — Structure, Steamer, Funnel, Cycle and Five Phases — over the Gate of Vitality engine. Hover or tap a level for its relationships.</desc>
        <defs>
          <marker id="aB" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="var(--bridge)"/></marker>
          <marker id="aE" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="var(--engine)"/></marker>
          <marker id="aU" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M5,0 L10,10 L0,10 z" fill="#8b97ab"/></marker>
          <radialGradient id="mmGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ef6f40" stop-opacity="0.9"/><stop offset="100%" stop-color="#ef6f40" stop-opacity="0.07"/></radialGradient>
          <radialGradient id="tjY" cx="50%" cy="38%" r="62%"><stop offset="0%" stop-color="#1c2740" stop-opacity=".55"/><stop offset="100%" stop-color="#1c2740" stop-opacity="0"/></radialGradient>
          <linearGradient id="yangGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(224,172,82,.16)"/><stop offset="100%" stop-color="rgba(224,172,82,.05)"/></linearGradient>
          <linearGradient id="yinGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(95,147,207,.16)"/><stop offset="100%" stop-color="rgba(95,147,207,.05)"/></linearGradient>
          <linearGradient id="funnelG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e0ac52" stop-opacity="0.14"/><stop offset="100%" stop-color="#3a2b66" stop-opacity="0.16"/></linearGradient>
          <linearGradient id="steamG" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#ef6f40" stop-opacity="0.5"/><stop offset="100%" stop-color="#e0ac52" stop-opacity="0.1"/></linearGradient>
        </defs>

        <!-- STRUCTURE DECOR -->
        <g class="vlayer d-structure">
          <rect x="64" y="85" width="1072" height="130" rx="15" fill="var(--open)" opacity=".06"/>
          <rect x="64" y="275" width="1072" height="130" rx="15" fill="var(--pivot)" opacity=".06"/>
          <rect x="64" y="465" width="1072" height="130" rx="15" fill="var(--close)" opacity=".06"/>
          <g text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing=".5">
            <text x="34" y="150" transform="rotate(-90 34 150)" fill="var(--open)">EXPANDING · kāi</text>
            <text x="34" y="340" transform="rotate(-90 34 340)" fill="var(--pivot)">PIVOT · shū</text>
            <text x="34" y="530" transform="rotate(-90 34 530)" fill="var(--close)">CLOSING · hé</text>
          </g>
          <text x="250" y="58" text-anchor="middle" fill="var(--yang)" font-size="13" font-weight="700" letter-spacing="2.5">YANG · exterior</text>
          <text x="950" y="58" text-anchor="middle" fill="var(--yin)" font-size="13" font-weight="700" letter-spacing="2.5">YIN · interior</text>
          <text x="600" y="758" text-anchor="middle" fill="var(--ink3)" font-size="11">hover or tap a level for its pair · tap Ming men for the source-qi feed</text>
        </g>

        <!-- STEAMER DECOR -->
        <g class="vlayer d-steamer">
          <rect x="492" y="46" width="216" height="560" rx="16" fill="url(#steamG)" opacity=".5"/>
          <g stroke="var(--ink3)" stroke-width="1.2" fill="none" opacity=".55">
            <path d="M455,56 H435 V200 H455"/><path d="M455,250 H435 V290 H455"/><path d="M455,340 H435 V580 H455"/>
          </g>
          <g font-size="10.5" fill="var(--ink3)">
            <text x="428" y="120" transform="rotate(-90 428 120)" text-anchor="middle">top basket · lid</text>
            <text x="424" y="274" text-anchor="end">dumplings</text>
            <text x="428" y="455" transform="rotate(-90 428 455)" text-anchor="middle">the pot · water</text>
            <text x="424" y="652" text-anchor="end">fire</text>
          </g>
          <path d="M772,600 V120" stroke="var(--engine)" stroke-width="2" fill="none" marker-end="url(#aE)" opacity=".7"/>
          <text x="786" y="360" fill="var(--engine)" font-size="11" font-weight="600" transform="rotate(90 786 360)" text-anchor="middle">qi rises &amp; transforms</text>
          <text x="600" y="712" text-anchor="middle" fill="var(--ink2)" font-size="11.5">Process: the fire below drives transformation upward and outward</text>
        </g>

        <!-- FUNNEL DECOR -->
        <g class="vlayer d-funnel">
          <polygon points="430,52 770,52 660,584 540,584" fill="url(#funnelG)" stroke="#39435a" stroke-width="1" stroke-dasharray="2 6"/>
          <text x="600" y="40" text-anchor="middle" fill="var(--ink2)" font-size="11.5" font-weight="600">outwardly-expanding &amp; moving</text>
          <text x="600" y="612" text-anchor="middle" fill="var(--ink2)" font-size="11.5" font-weight="600">inwardly-contracting &amp; still</text>
          <line x1="814" y1="80" x2="814" y2="560" stroke="#8b97ab" stroke-width="1.5" marker-start="url(#aU)" marker-end="url(#aU)" opacity=".55"/>
          <g font-size="11" fill="var(--ink3)">
            <text x="368" y="84">1</text><text x="368" y="179">2</text><text x="368" y="274">3</text>
            <text x="368" y="369">4</text><text x="368" y="464">5</text><text x="368" y="559">6</text>
          </g>
          <text x="600" y="704" text-anchor="middle" fill="var(--ink2)" font-size="11.5">Depth continuum: one gradient from surface to blood, not a ladder</text>
        </g>

        <!-- TAIJI DECOR -->
        <g class="vlayer d-taiji">
          <circle cx="600" cy="400" r="128" fill="url(#tjY)"/>
          <circle cx="600" cy="400" r="128" fill="none" stroke="var(--line2)" stroke-width="1" opacity=".6"/>
          <path d="M600,272 A64,64 0 0,1 600,400 A64,64 0 0,0 600,528 A128,128 0 0,1 600,272 Z" fill="#5f93cf" opacity=".16"/>
          <circle cx="600" cy="336" r="12" fill="#5f93cf" opacity=".22"/><circle cx="600" cy="464" r="12" fill="#e0ac52" opacity=".22"/>
          <text x="600" y="394" text-anchor="middle" fill="var(--engine)" font-size="13" font-weight="700">Ming men</text>
          <text x="600" y="414" text-anchor="middle" fill="var(--ink3)" font-size="10.5">source qi · the hub</text>
          <path id="cycArc" d="M812,600 C600,735 170,720 120,430 C90,320 150,250 259,240" fill="none" stroke="var(--bridge)" stroke-width="2.2" marker-end="url(#aB)"/>
          <text id="cycLabel" x="108" y="430" fill="var(--bridge)" font-size="11" font-weight="600" transform="rotate(-90 108 430)" text-anchor="middle">Jué yīn reverts → Tài yáng</text>
          <text x="58" y="400" text-anchor="middle" fill="var(--yang)" font-size="12" font-weight="700" letter-spacing="3" transform="rotate(-90 58 400)">YANG</text>
          <text x="1142" y="400" text-anchor="middle" fill="var(--yin)" font-size="12" font-weight="700" letter-spacing="3" transform="rotate(90 1142 400)">YIN</text>
          <text x="600" y="744" text-anchor="middle" fill="var(--ink2)" font-size="11.5">Cycle: hover Jué yīn or Tài yáng to trace the reversal that closes the loop</text>
        </g>

        <!-- FIVE PHASES DECOR -->
        <g class="vlayer d-phases">
          <g id="shengG" stroke="#8b97ab" stroke-width="1.7" fill="none" opacity=".75" marker-end="url(#aU)">
            <line id="sh0"/><line id="sh1"/><line id="sh2"/><line id="sh3"/><line id="sh4"/>
          </g>
          <g id="keG" stroke="#8b97ab" stroke-width="1.1" fill="none" opacity=".4" stroke-dasharray="5 5" marker-end="url(#aU)">
            <line id="ke0"/><line id="ke1"/><line id="ke2"/><line id="ke3"/><line id="ke4"/>
          </g>
          <text x="600" y="396" text-anchor="middle" fill="var(--ink3)" font-size="11">outer ring = generating (shēng)</text>
          <text x="600" y="414" text-anchor="middle" fill="var(--ink3)" font-size="11">inner star = controlling (kè)</text>
          <g class="phcard" data-ph="fire" transform="translate(600,196)" onmouseenter="showInfo('ph_fire')" onclick="showInfo('ph_fire')">
            <rect x="-80" y="-30" width="160" height="60" rx="13" fill="rgba(224,89,75,.15)" stroke="var(--fire)" stroke-width="1.4"/>
            <text x="0" y="-5" text-anchor="middle" fill="var(--fire)" font-size="15" font-weight="700">Fire</text>
            <text x="0" y="15" text-anchor="middle" fill="var(--ink2)" font-size="10.5">HT · SI · PC · SJ</text></g>
          <g class="phcard" data-ph="earth" transform="translate(778,350)" onmouseenter="showInfo('ph_earth')" onclick="showInfo('ph_earth')">
            <rect x="-80" y="-30" width="160" height="60" rx="13" fill="rgba(216,166,78,.15)" stroke="var(--earth)" stroke-width="1.4"/>
            <text x="0" y="-5" text-anchor="middle" fill="var(--earth)" font-size="15" font-weight="700">Earth</text>
            <text x="0" y="15" text-anchor="middle" fill="var(--ink2)" font-size="10.5">Spleen · Stomach</text></g>
          <g class="phcard" data-ph="metal" transform="translate(702,560)" onmouseenter="showInfo('ph_metal')" onclick="showInfo('ph_metal')">
            <rect x="-80" y="-30" width="160" height="60" rx="13" fill="rgba(205,213,222,.13)" stroke="var(--metal)" stroke-width="1.4"/>
            <text x="0" y="-5" text-anchor="middle" fill="var(--metal)" font-size="15" font-weight="700">Metal</text>
            <text x="0" y="15" text-anchor="middle" fill="var(--ink2)" font-size="10.5">Lung · Large Int.</text></g>
          <g class="phcard" data-ph="water" transform="translate(498,560)" onmouseenter="showInfo('ph_water')" onclick="showInfo('ph_water')">
            <rect x="-80" y="-30" width="160" height="60" rx="13" fill="rgba(79,134,198,.16)" stroke="var(--water)" stroke-width="1.4"/>
            <text x="0" y="-5" text-anchor="middle" fill="var(--water)" font-size="15" font-weight="700">Water</text>
            <text x="0" y="15" text-anchor="middle" fill="var(--ink2)" font-size="10.5">Kidney · Bladder</text></g>
          <g class="phcard" data-ph="wood" transform="translate(422,350)" onmouseenter="showInfo('ph_wood')" onclick="showInfo('ph_wood')">
            <rect x="-80" y="-30" width="160" height="60" rx="13" fill="rgba(78,183,132,.15)" stroke="var(--wood)" stroke-width="1.4"/>
            <text x="0" y="-5" text-anchor="middle" fill="var(--wood)" font-size="15" font-weight="700">Wood</text>
            <text x="0" y="15" text-anchor="middle" fill="var(--ink2)" font-size="10.5">Liver · Gallbladder</text></g>
          <text x="600" y="726" text-anchor="middle" fill="var(--ink2)" font-size="11.5">Organs: the six levels distributed across the five-phase web</text>
        </g>

        <!-- HOVER OVERLAYS -->
        <g id="srcArrows" stroke="var(--engine)" stroke-width="1.7" fill="none" marker-end="url(#aE)"><path id="src1"/><path id="src2"/></g>
        <path id="hlPair" fill="none" stroke="var(--bridge)" stroke-width="2.4"/>
        <text id="hlLabel" text-anchor="middle" fill="var(--bridge)" font-size="11.5" font-weight="600"></text>

        <!-- NODES -->
        <g class="node" data-id="tai_yang" style="transform:translate(250px,150px)" onmouseenter="nodeEnter('tai_yang')" onmouseleave="nodeLeave()" onclick="nodeTap('tai_yang')">
          <g class="nodecard"><rect class="nbg" x="-150" y="-65" width="300" height="130" rx="15" fill="url(#yangGrad)" stroke="var(--yang-bd)" stroke-width="1.4"/>
            <text x="-130" y="-30" fill="var(--yang)" font-size="21" font-weight="700">Tài yáng</text>
            <text x="130" y="-31" text-anchor="end" fill="var(--ink3)" font-size="12" font-style="italic">greater yang</text>
            <text x="-130" y="-7" fill="var(--open)" font-size="12" font-weight="600">kāi · expanding · surface</text>
            <text x="-130" y="22" fill="var(--ink)" font-size="14">Small Intestine + Bladder</text>
            <text x="-130" y="45" fill="var(--ink2)" font-size="12">Cold · first defense</text></g>
          <g class="nodecap"><rect class="nbg" x="-94" y="-26" width="188" height="52" rx="12" fill="url(#yangGrad)" stroke="var(--yang-bd)" stroke-width="1.3"/>
            <rect x="-92" y="-22" width="6" height="44" rx="3" fill="var(--open)"/>
            <text x="-76" y="-3" fill="var(--yang)" font-size="15" font-weight="700">Tài yáng</text>
            <text x="-76" y="15" fill="var(--ink2)" font-size="10.5">SI + Bladder · Cold</text></g>
        </g>
        <g class="node" data-id="shao_yang" style="transform:translate(250px,340px)" onmouseenter="nodeEnter('shao_yang')" onmouseleave="nodeLeave()" onclick="nodeTap('shao_yang')">
          <g class="nodecard"><rect class="nbg" x="-150" y="-65" width="300" height="130" rx="15" fill="url(#yangGrad)" stroke="var(--yang-bd)" stroke-width="1.4"/>
            <text x="-130" y="-30" fill="var(--yang)" font-size="21" font-weight="700">Shǎo yáng</text>
            <text x="130" y="-31" text-anchor="end" fill="var(--ink3)" font-size="12" font-style="italic">lesser yang</text>
            <text x="-130" y="-7" fill="var(--pivot)" font-size="12" font-weight="600">shū · pivot · between out/in</text>

const CYCLEINFO = {tag:"Cycle · reversion",tc:"var(--bridge)",bg:"rgba(191,138,230,.18)",title:"Jué yīn → Tài yáng",sub:"the loop closes",
  rows:[["Idea","Yin reaches its term and reverts to yang — the deepest point becomes the seed of the most external"],["Why","The six levels are a closed, turning cycle, not a dead end"],["Clinic","Recovery often turns here; deep cold can suddenly throw heat outward"]],note:"The reversal the static map cannot show."};
const VINFO = {
  structure:{tag:"View · Structure",tc:"#7fb0e6",bg:"rgba(95,147,207,.16)",title:"Pairs, roles & engine",sub:"The canonical butterfly — yang left, yin right.",
    rows:[["Rows","Each row is a role: Expanding · Pivot · Closing (kāi · shū · hé)"],["Diagonals","Interior-exterior organ pairs cross diagonally; the role shifts one step"],["Connections","Hover or tap a level for its pair; tap Ming men for the source-qi feed"],["Per card","Each level separates Channel from Organ function","ch"]],note:"Lines appear on demand so the grid stays clean. Tap a card for full detail."},
  steamer:{tag:"View · Steamer",tc:"var(--engine)",bg:"rgba(239,111,64,.16)",title:"The process of transformation",sub:"Energy rises from the fire below.",
    rows:[["Read","Bottom-up: fire (Ming men) → pot → steam → baskets → out the top"],["Shows","Why a weak source-fire slows the whole caisson"],["Hover/tap","Each capsule for its role in the boil"]],note:"Tài yáng is steam leaving; Jué yīn is the iron pot; Ming men is the flame."},
  funnel:{tag:"View · Funnel",tc:"#7fb0e6",bg:"rgba(95,147,207,.16)",title:"The depth continuum",sub:"From movement to stillness.",
    rows:[["Axis","Outwardly-expanding & moving (top) → inwardly-contracting & still (bottom)"],["Order","Depth 1 (Tài yáng) down to 6 (Jué yīn)"],["Hover/tap","Each level for where it sits on the gradient"]],note:"Same order as the steamer, read as one continuous depth — not a ladder."},
  taiji:{tag:"View · Cycle",tc:"var(--bridge)",bg:"rgba(191,138,230,.18)",title:"The turning loop",sub:"Yang left, yin right, around one center.",
    rows:[["Closure","Jué yīn reverts to Tài yáng — the deepest point seeds the most external"],["Center","Ming men, the source, at the hub"],["Hover/tap","Each level for its place in the turn; the arc for the reversal"]],note:"What the static map cannot show: the system is cyclic and alive."},
  phases:{tag:"View · Five Phases",tc:"var(--wood)",bg:"rgba(78,183,132,.16)",title:"The organ web",sub:"Generating ring + controlling star.",
    rows:[["Outer ring","Generating (shēng): Wood→Fire→Earth→Metal→Water→Wood"],["Inner star","Controlling (kè): each phase restrains another across the star"],["Hover/tap","A phase card for its organs, generation and control"]],note:"Here the unit is organs — the six levels spread across the five phases (Fire holds two)."}
};
const PAIR={tai_yang:'shao_yin',shao_yin:'tai_yang',shao_yang:'jue_yin',jue_yin:'shao_yang',yang_ming:'tai_yin',tai_yin:'yang_ming'};
const PAIRLABEL={tai_yang:'Water ⇄ Fire',shao_yin:'Water ⇄ Fire',shao_yang:'Wood · fire',jue_yin:'Wood · fire',yang_ming:'Dryness ⇄ Damp',tai_yin:'Dryness ⇄ Damp'};
const VIEWS={
  structure:{tai_yang:[250,150],shao_yang:[250,340],yang_ming:[250,530],tai_yin:[950,150],shao_yin:[950,340],jue_yin:[950,530],engine:[600,690]},
  steamer:{tai_yang:[600,80],shao_yang:[600,175],yang_ming:[600,270],tai_yin:[600,365],shao_yin:[600,460],jue_yin:[600,555],engine:[600,650]},
  funnel:{tai_yang:[600,80],shao_yang:[600,175],yang_ming:[600,270],tai_yin:[600,365],shao_yin:[600,460],jue_yin:[600,555],engine:[600,650]},
  taiji:{tai_yang:[355,235],shao_yang:[355,400],yang_ming:[355,565],tai_yin:[845,235],shao_yin:[845,400],jue_yin:[845,565],engine:[600,400]},
  phases:{tai_yang:[600,150],shao_yang:[250,400],yang_ming:[600,650],tai_yin:[950,400],shao_yin:[820,250],jue_yin:[380,250],engine:[600,400]}
};
const VORDER=['structure','steamer','funnel','taiji','phases'];
let currentView='structure', pinned=null;
const svg=document.getElementById('scheme');
const hlPair=document.getElementById('hlPair');
const hlLabel=document.getElementById('hlLabel');
function edgePt(c,t,hw,hh,gap){
  const dx=t[0]-c[0], dy=t[1]-c[1], L=Math.hypot(dx,dy)||1;
  let k=Math.min(hw/(Math.abs(dx)||1e-9), hh/(Math.abs(dy)||1e-9));
  k += (gap||0)/L;
  return [c[0]+dx*k, c[1]+dy*k];
}
function info(id){
  if(VIEWINFO[currentView] && VIEWINFO[currentView][id]) return VIEWINFO[currentView][id];
  if(PHASES[id]) return PHASES[id];
  if(id==='cycle') return CYCLEINFO;
  return STRUCT[id];
}
function render(d){
  if(typeof d==='string') d=info(d)||VINFO[d]; if(!d) return;
  let h='<span class="htag" style="background:'+d.bg+';color:'+d.tc+'">'+d.tag+'</span>';
  h+='<h2 style="color:'+d.tc+'">'+d.title+'</h2><p class="sub">'+d.sub+'</p>';
  d.rows.forEach(r=>h+='<div class="row '+(r[2]||'')+'"><div class="k">'+r[0]+'</div><div class="v">'+r[1]+'</div></div>');
  if(d.note)h+='<div class="note">'+d.note+'</div>';
  document.getElementById('info').innerHTML=h;
}
function clearHL(){ hlPair.style.opacity=0; hlLabel.style.opacity=0; svg.classList.remove('dim','show-src','show-cyc'); document.querySelectorAll('.node').forEach(n=>n.classList.remove('hl','sel')); }
function showHL(id){
  render(id);
  document.querySelectorAll('.node').forEach(n=>n.classList.toggle('sel',n.getAttribute('data-id')===id));
  const P=VIEWS[currentView];
  if(currentView==='taiji'){
    if(id==='jue_yin'||id==='tai_yang'){
      svg.classList.add('show-cyc','dim');
      document.querySelectorAll('.node').forEach(n=>{const i=n.getAttribute('data-id');n.classList.toggle('hl', i==='jue_yin'||i==='tai_yang');});
    }
    return;
  }
  if(id==='engine'){
    if(currentView==='structure'){
      const E=P.engine;
      document.getElementById('src1').setAttribute('d','M'+edgePt(E,P.shao_yin,168,40,4).join(',')+' L'+edgePt(P.shao_yin,E,150,65,9).join(','));
      document.getElementById('src2').setAttribute('d','M'+edgePt(E,P.shao_yang,168,40,4).join(',')+' L'+edgePt(P.shao_yang,E,150,65,9).join(','));
      svg.classList.add('show-src');
    }
    return;
  }
  if(currentView!=='structure') return;
  const p=PAIR[id];
  if(!p||!P[id]||!P[p]) return;
  const a=P[id],b=P[p];
  const p1=edgePt(a,b,150,65,9), p2=edgePt(b,a,150,65,9);
  hlPair.setAttribute('d','M'+p1[0]+','+p1[1]+' L'+p2[0]+','+p2[1]); hlPair.style.opacity=1;
  hlLabel.setAttribute('x',(p1[0]+p2[0])/2); hlLabel.setAttribute('y',(p1[1]+p2[1])/2-7);
  hlLabel.textContent=PAIRLABEL[id]||''; hlLabel.style.opacity=1;
  svg.classList.add('dim');
  document.querySelectorAll('.node').forEach(n=>{const i=n.getAttribute('data-id');n.classList.toggle('hl',i===id||i===p);});
}
function nodeEnter(id){ if(pinned) return; clearHL(); showHL(id); }
function nodeLeave(){ if(pinned) return; clearHL(); render(VINFO[currentView]); }
function nodeTap(id){ if(pinned===id){ pinned=null; clearHL(); render(VINFO[currentView]); return;} pinned=id; clearHL(); showHL(id); }
function clearPin(){ if(!pinned) return; pinned=null; clearHL(); render(VINFO[currentView]); }
function showInfo(id){ render(id); }
function layoutPhases(){
  const P={fire:[600,196],earth:[778,350],metal:[702,560],water:[498,560],wood:[422,350]};
  const hw=80,hh=30,gap=8;
  const sheng=[['wood','fire'],['fire','earth'],['earth','metal'],['metal','water'],['water','wood']];
  const ke=[['wood','earth'],['earth','water'],['water','fire'],['fire','metal'],['metal','wood']];
  function set(id,a,b){const p1=edgePt(P[a],P[b],hw,hh,gap),p2=edgePt(P[b],P[a],hw,hh,gap);const l=document.getElementById(id);l.setAttribute('x1',p1[0]);l.setAttribute('y1',p1[1]);l.setAttribute('x2',p2[0]);l.setAttribute('y2',p2[1]);}
  sheng.forEach((e,i)=>set('sh'+i,e[0],e[1]));
  ke.forEach((e,i)=>set('ke'+i,e[0],e[1]));
}
function applyView(name){
  currentView=name; pinned=null;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',VORDER[i]===name));
  VORDER.forEach(v=>svg.classList.toggle('view-'+v,v===name));
  svg.classList.toggle('caps',name!=='structure');
  const P=VIEWS[name];
  document.querySelectorAll('.node').forEach(n=>{const id=n.getAttribute('data-id');const p=P[id];if(p)n.style.transform='translate('+p[0]+'px,'+p[1]+'px)';});
  clearHL();
  document.getElementById('vhint').textContent=VINFO[name].title+' — '+VINFO[name].sub;
  render(VINFO[name]);
  try{history.replaceState(null,'','#'+name);}catch(e){}
}
function toggleTheme(){ document.body.classList.toggle('light'); try{localStorage.setItem('scm-theme',document.body.classList.contains('light')?'light':'dark');}catch(e){} }
(function init(){
  try{ if(localStorage.getItem('scm-theme')==='light') document.body.classList.add('light'); }catch(e){}
  layoutPhases();
  document.querySelectorAll('.node').forEach(n=>{
    n.setAttribute('tabindex','0'); n.setAttribute('role','button');
    n.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); nodeTap(n.getAttribute('data-id')); } });
  });
  svg.addEventListener('click',e=>{ if(!e.target.closest('.node') && !e.target.closest('.hit') && !e.target.closest('.phcard')) clearPin(); });
  const h=(location.hash||'').replace('#',''); applyView(VIEWS[h]?h:'structure');
})();
</script>
</body>
